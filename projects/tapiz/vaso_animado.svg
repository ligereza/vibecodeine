    <circle cx="403.4" cy="258" r="1.30" fill="#f8f1e3" opacity="0"><animate attributeName="opacity" values="0;0.081;0" dur="128s" begin="-78s" repeatCount="indefinite"/></circle>
    <circle cx="239.9" cy="292" r="1.65" fill="#f8f1e3" opacity="0"><animate attributeName="opacity" values="0;0.099;0" dur="137s" begin="-91s" repeatCount="indefinite"/></circle>
    <circle cx="400.1" cy="292" r="2.00" fill="#f8f1e3" opacity="0"><animate attributeName="opacity" values="0;0.045;0" dur="76s" begin="-7s" repeatCount="indefinite"/></circle>
    <circle cx="243.3" cy="326" r="1.30" fill="#f8f1e3" opacity="0"><animate attributeName="opacity" values="0;0.063;0" dur="85s" begin="-20s" repeatCount="indefinite"/></circle>
    <circle cx="396.7" cy="326" r="1.65" fill="#f8f1e3" opacity="0"><animate attributeName="opacity" values="0;0.081;0" dur="94s" begin="-33s" repeatCount="indefinite"/></circle>
    <circle cx="246.2" cy="356" r="2.00" fill="#f8f1e3" opacity="0"><animate attributeName="opacity" values="0;0.099;0" dur="103s" begin="-46s" repeatCount="indefinite"/></circle>
    <circle cx="393.8" cy="356" r="1.30" fill="#f8f1e3" opacity="0"><animate attributeName="opacity" values="0;0.045;0" dur="112s" begin="-59s" repeatCount="indefinite"/></circle>
  </g>
</svg>
