<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeCode Spaces — Visualizador HTML</title>
  <style>
    :root {
      --bg: #0b0b10;
      --panel: #13131c;
      --border: #2a2a3a;
      --text: #888899;
      --accent: #00f2ff;
      --word: #5a5a6e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Consolas', 'Monaco', monospace;
      font-size: 14px;
      line-height: 1.5;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Panel de controles */
    aside {
      width: 320px;
      min-width: 260px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow-y: auto;
    }

    h1 {
      margin: 0;
      font-size: 1.25rem;
      color: #fff;
      letter-spacing: 0.02em;
    }

    h1 span { color: var(--accent); }

    .group { display: flex; flex-direction: column; gap: 0.35rem; }
    label { font-size: 0.8rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }

    select, input[type="range"], input[type="text"], button, textarea {
      background: var(--bg);
      color: #ddd;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.55rem 0.7rem;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
    }

    select:focus, input:focus, textarea:focus, button:focus { border-color: var(--accent); }

    textarea {
      resize: vertical;
      min-height: 140px;
      line-height: 1.4;
    }

    .row { display: flex; gap: 0.5rem; align-items: center; }
    .row input[type="range"] { flex: 1; }
    .row span { min-width: 3rem; text-align: right; font-size: 0.8rem; }

    .checks { display: flex; gap: 1rem; flex-wrap: wrap; }
    .checks label { display: flex; align-items: center; gap: 0.35rem; text-transform: none; cursor: pointer; }

    button {
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-weight: 600;
    }
    button:hover { background: #1c1c2a; border-color: var(--accent); }
    button.primary { background: var(--accent); color: #000; border-color: var(--accent); }
    button.primary:hover { background: #33f5ff; }

    .hint {
      font-size: 0.75rem;
      color: #666;
      line-height: 1.4;
    }

    /* Canvas */
    main {
      flex: 1;
      position: relative;
      overflow: auto;
      padding: 2rem;
    }

    #canvas {
      margin: 0 auto;
      max-width: 900px;
      min-height: 100%;
      background: #0f0f16;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      white-space: pre;
      font-size: 14px;
      line-height: 1.55;
      overflow: auto;
      box-shadow: 0 0 40px rgba(0, 242, 255, 0.04);
    }

    #canvas .word { color: var(--word); }
    #canvas .space {
      transition: color 0.08s linear;
      /* Hace que los espacios sean un poco más anchos de lo normal para que se vean como bloques */
      display: inline;
    }

    #fileInput { display: none; }

    .pallet-swatch {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 2px;
      border: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>
  <aside>
    <h1>VibeCode <span>Spaces</span></h1>
    <p class="hint">Visualiza la topología del código coloreando solo sus espacios vacíos. Pega código o carga un archivo.</p>

    <div class="group">
      <label for="source">Código fuente</label>
      <textarea id="source" spellcheck="false"></textarea>
    </div>

    <div class="group">
      <label>Archivo</label>
      <div class="row">
        <button id="loadFile">📂 Cargar .py / .txt</button>
        <button id="resetSample">🔄 Demo</button>
      </div>
      <input type="file" id="fileInput" accept=".py,.txt,.js,.ts,.md,.json,.html,.css,.c,.cpp,.rs,.go" />
    </div>

    <div class="group">
      <label for="mode">Modo</label>
      <select id="mode">
        <option value="flow">flow — onda sinusoidal</option>
        <option value="scan">scan — barra vertical</option>
        <option value="drift">drift — cambio suave</option>
        <option value="pulse">pulse — pulsos por bloque</option>
        <option value="rain">rain — lluvia de color</option>
        <option value="void">void — espacios estáticos</option>
        <option value="length">length — color por longitud</option>
        <option value="blocks">blocks — bloques sólidos</option>
      </select>
    </div>

    <div class="group">
      <label for="palette">Paleta</label>
      <select id="palette"></select>
    </div>

    <div class="group">
      <label for="fillChar">Carácter de espacio</label>
      <input type="text" id="fillChar" value="·" maxlength="1" />
    </div>

    <div class="group">
      <label for="speed">Velocidad de animación</label>
      <div class="row">
        <input type="range" id="speed" min="0" max="100" value="30" />
        <span id="speedVal">30</span>
      </div>
    </div>

    <div class="group">
      <div class="checks">
        <label><input type="checkbox" id="ghost" checked /> Ver texto</label>
        <label><input type="checkbox" id="animate" checked /> Animar</label>
      </div>
    </div>

    <div class="group" style="margin-top: auto;">
      <div class="row">
        <button id="togglePlay" class="primary">⏸ Pausar</button>
        <button id="exportHtml">⬇ Exportar HTML</button>
      </div>
    </div>
  </aside>

  <main>
    <pre id="canvas"></pre>
  </main>

  <script>
    // -------------------------------------------------------------------
    // Paletas
    // -------------------------------------------------------------------
    const PALETTES = {
      neon:   ['#00f2ff', '#ff00aa', '#a020f0', '#f2ff00', '#00ff66', '#57ffdb', '#d557ff'],
      cyber:  ['#57f7ff', '#8d8dff', '#6b6bff', '#ffffff', '#75ff9e', '#d57fff'],
      matrix: ['#008f00', '#00cc00', '#004400', '#00ff22', '#55ff55', '#99ff99'],
      fire:   ['#ff5555', '#cc0000', '#ffff55', '#ccaa00', '#ff8800', '#ffaa33'],
      rainbow:['#ff0000', '#ff8800', '#ffff00', '#00ff00', '#00ffff', '#0000ff', '#aa00ff', '#ff00ff'],
      deep:   ['#0a0a4a', '#0f1f3f', '#142e4f', '#1f3f5f', '#2a4f6f', '#3f6f9f'],
      glitch: ['#00ff2a', '#ff003c', '#ffff00', '#ff00c8', '#00ffff', '#ffffff']
    };

    // -------------------------------------------------------------------
    // Demo
    // -------------------------------------------------------------------
    const SAMPLE_CODE = `# --- Topología de IA: indentación y one-liners ---

def procesar_tensores(matriz, factores):
    resultados = []
    for fila in matriz:
        activacion = [max(0.0, x * f) for x, f in zip(fila, factores)]
        if sum(activacion) > 100.5:
            resultados.append(activacion)
    return resultados

# One-liner denso
data = list(map(lambda x: x**2, filter(lambda y: y % 2 == 0, range(1000))))

class Modelo:
    def __init__(self, capas):
        self.capas = capas

    def forward(self, x):
        for capa in self.capas:
            x = capa(x)
        return x
`;

    // -------------------------------------------------------------------
    // Utilidades
    // -------------------------------------------------------------------
    const escapeHtml = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    function tokenizeLine(line) {
      const tokens = [];
      const regex = /(\s+)/g;
      let last = 0;
      let m;
      while ((m = regex.exec(line)) !== null) {
        if (m.index > last) {
          tokens.push({ type: 'word', text: line.slice(last, m.index) });
        }
        tokens.push({ type: 'space', text: m[1] });
        last = m.index + m[1].length;
      }
      if (last < line.length) {
        tokens.push({ type: 'word', text: line.slice(last) });
      }
      return tokens;
    }

    function getStaticColor(mode, length, palette, index) {
      if (mode === 'length') {
        return palette[Math.min(length, palette.length) - 1] || palette[0];
      }
      return palette[(length + index) % palette.length];
    }

    function getAnimatedColor(mode, x, y, length, palette, t, totalLines) {
      const n = palette.length;
      if (mode === 'flow') {
        const v = Math.sin((x + y * 2 + t * 3) * 0.15);
        const idx = Math.floor(((v + 1) / 2) * n) % n;
        return palette[idx < 0 ? idx + n : idx];
      }
      if (mode === 'scan') {
        const scanPos = (t * 2) % 80;
        const dist = Math.abs((x + length / 2) - scanPos);
        return dist < 6 ? palette[Math.floor(dist) % n] : '#5a5a6e';
      }
      if (mode === 'drift') {
        return palette[(x + y + Math.floor(t)) % n];
      }
      if (mode === 'pulse') {
        const idx = Math.min(length, n) - 1;
        const pulse = Math.abs(Math.sin(t * 0.2 + length));
        return pulse > 0.3 ? palette[idx] : '#5a5a6e';
      }
      if (mode === 'rain') {
        const drop = (y + Math.floor(t)) % (totalLines + 5);
        return Math.abs(drop - y) < 3 ? palette[(y + Math.floor(t)) % n] : '#5a5a6e';
      }
      return palette[length % n];
    }

    // -------------------------------------------------------------------
    // Estado
    // -------------------------------------------------------------------
    const els = {
      source: document.getElementById('source'),
      canvas: document.getElementById('canvas'),
      mode: document.getElementById('mode'),
      palette: document.getElementById('palette'),
      fillChar: document.getElementById('fillChar'),
      speed: document.getElementById('speed'),
      speedVal: document.getElementById('speedVal'),
      ghost: document.getElementById('ghost'),
      animate: document.getElementById('animate'),
      togglePlay: document.getElementById('togglePlay'),
      loadFile: document.getElementById('loadFile'),
      fileInput: document.getElementById('fileInput'),
      resetSample: document.getElementById('resetSample'),
      exportHtml: document.getElementById('exportHtml')
    };

    let playing = true;
    let startTime = Date.now();
    let lastT = 0;

    // -------------------------------------------------------------------
    // Inicializar selector de paletas
    // -------------------------------------------------------------------
    function buildPaletteOptions() {
      els.palette.innerHTML = '';
      for (const name of Object.keys(PALETTES)) {
        const opt = document.createElement('option');
        opt.value = name;
        const colors = PALETTES[name];
        const swatches = colors.map(c => `<span class="pallet-swatch" style="background:${c}"></span>`).join('');
        opt.innerHTML = `${swatches} ${name}`;
        els.palette.appendChild(opt);
      }
      els.palette.value = 'neon';
    }

    // -------------------------------------------------------------------
    // Renderizado
    // -------------------------------------------------------------------
    function renderFrame(t) {
      const text = els.source.value;
      const mode = els.mode.value;
      const paletteName = els.palette.value;
      const palette = PALETTES[paletteName];
      const fillChar = els.fillChar.value || '·';
      const ghost = els.ghost.checked;
      const staticMode = ['void', 'length', 'blocks'].includes(mode);
      const lines = text.split('\n');
      const totalLines = lines.length;

      let html = '';
      for (let y = 0; y < lines.length; y++) {
        const line = lines[y];
        const tokens = tokenizeLine(line);
        let x = 0;
        for (let i = 0; i < tokens.length; i++) {
          const token = tokens[i];
          if (token.type === 'space') {
            const length = token.text.length;
            const color = staticMode
              ? getStaticColor(mode, length, palette, i)
              : getAnimatedColor(mode, x, y, length, palette, t, totalLines);
            const chars = fillChar.repeat(length).replace(/ /g, '&nbsp;');
            html += `<span class="space" style="color:${color}">${chars}</span>`;
          } else {
            const escaped = escapeHtml(token.text).replace(/ /g, '&nbsp;');
            html += ghost ? `<span class="word">${escaped}</span>` : `<span style="opacity:0">${escaped}</span>`;
          }
          x += token.text.length;
        }
        html += '\n';
      }
      els.canvas.innerHTML = html;
    }

    // -------------------------------------------------------------------
    // Animación
    // -------------------------------------------------------------------
    function loop() {
      if (!playing) return;
      const speed = parseInt(els.speed.value, 10) / 100;
      const now = Date.now();
      const t = (now - startTime) / 1000 * (speed * 5);
      lastT = t;
      renderFrame(t);
      requestAnimationFrame(loop);
    }

    function restart() {
      startTime = Date.now();
      lastT = 0;
      if (playing) requestAnimationFrame(loop);
      else renderFrame(0);
    }

    // -------------------------------------------------------------------
    // Eventos
    // -------------------------------------------------------------------
    function update() {
      if (els.animate.checked) {
        playing = true;
        els.togglePlay.textContent = '⏸ Pausar';
        restart();
      } else {
        playing = false;
        els.togglePlay.textContent = '▶ Reproducir';
        renderFrame(0);
      }
    }

    els.togglePlay.addEventListener('click', () => {
      if (els.animate.checked) {
        playing = !playing;
        els.togglePlay.textContent = playing ? '⏸ Pausar' : '▶ Reproducir';
        if (playing) restart();
      } else {
        els.animate.checked = true;
        update();
      }
    });

    els.animate.addEventListener('change', update);
    els.mode.addEventListener('change', () => { if (!playing) renderFrame(0); });
    els.palette.addEventListener('change', () => { if (!playing) renderFrame(0); });
    els.fillChar.addEventListener('input', () => { if (!playing) renderFrame(0); });
    els.ghost.addEventListener('change', () => { if (!playing) renderFrame(0); });
    els.source.addEventListener('input', restart);

    els.speed.addEventListener('input', () => {
      els.speedVal.textContent = els.speed.value;
    });

    els.loadFile.addEventListener('click', () => els.fileInput.click());
    els.fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        els.source.value = ev.target.result;
        restart();
      };
      reader.readAsText(file);
    });

    els.resetSample.addEventListener('click', () => {
      els.source.value = SAMPLE_CODE;
      restart();
    });

    // Exportar un HTML estático del frame actual
    els.exportHtml.addEventListener('click', () => {
      const html = `<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><title>VibeCode Spaces Export</title>
<style>
body{background:#0b0b10;color:#888;font-family:monospace;padding:2rem;}
pre{white-space:pre;background:#0f0f16;border:1px solid #2a2a3a;padding:1.5rem;border-radius:8px;}
.word{color:#5a5a6e;}
.space{display:inline;}
</style></head><body><pre>${els.canvas.innerHTML}</pre></body></html>`;
      const blob = new Blob([html], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'vibecode_spaces.html';
      a.click();
      URL.revokeObjectURL(url);
    });

    // -------------------------------------------------------------------
    // Inicio
    // -------------------------------------------------------------------
    buildPaletteOptions();
    els.source.value = SAMPLE_CODE;
    update();
  </script>
</body>
</html>
