<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.96  0 0 0 0 0.94  0 0 0 0 0.92  0 0 0 0.06 0"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#0b0a09"/>
  <rect width="1200" height="630" filter="url(#noise)"/>

  <!-- top bar -->
  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" fill="#a09c95" letter-spacing="3">
    <text x="60" y="60" text-transform="uppercase">ISKVW · ARCHIVO</text>
    <text x="1140" y="60" text-anchor="end" text-transform="uppercase">BUENOS AIRES</text>
  </g>

  <!-- statement (display) -->
  <g font-family="Fraunces, Times New Roman, serif" fill="#f4f1ec">
    <text x="60" y="280" font-size="92" font-weight="300" letter-spacing="-2">Fragmentos</text>
    <text x="60" y="370" font-size="92" font-weight="300" font-style="italic" fill="#a09c95" letter-spacing="-2">de imágenes</text>
    <text x="60" y="460" font-size="92" font-weight="300" letter-spacing="-2">que ya no</text>
    <text x="60" y="550" font-size="92" font-weight="300" letter-spacing="-2">existen.</text>
  </g>

  <!-- right vertical mark -->
  <g transform="translate(1110, 580) rotate(-90)" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" fill="#5a564f" letter-spacing="4">
    <text>MAXIMILIANO · @ISKVW</text>
  </g>

  <!-- corner monogram -->
  <g stroke="#f4f1ec" stroke-width="2" fill="none">
    <path d="M60 595 L60 615"/>
    <path d="M70 595 L86 615"/>
    <path d="M86 595 L70 615"/>
    <path d="M96 595 L96 615"/>
  </g>
</svg>
