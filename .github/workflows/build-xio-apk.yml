name: build-xio-apk
# Builds hotspot_boot_service APK (AccessibilityService reboot-recovery del
# Xiaomi) en runner ubuntu -- esta PC no tiene toolchain Android (Java/SDK).
# Solo manual: gh workflow run build-xio-apk.yml
permissions:
  contents: read
on:
  workflow_dispatch:
jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
      - name: Build debug APK
        run: gradle assembleDebug
        working-directory: xio/hotspot_boot_service
      - uses: actions/upload-artifact@v4
        with:
          name: hotspot-boot-apk
          path: xio/hotspot_boot_service/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
