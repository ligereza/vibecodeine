name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: python3 -m pip install -e ".[dev]"
      - run: python3 -m compileall -q src scripts tests
      - run: python3 -m flujo health
      - run: python3 -m pytest tests/ -q --tb=short
