name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install
        run: |
          python3 -m pip install -e .
          python3 -m pip install pytest

      - name: Health
        run: python3 -m flujo health || python -m flujo health || true

      - name: Tests
        run: python3 -m pytest tests/ -q --tb=no || python -m pytest tests/ -q --tb=no || true
