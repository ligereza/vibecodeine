<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLUJO • Material RD</title>
<link rel="stylesheet" href="shared/flujo.css">
<style>
  /* Estilos propios de esta página (lo común vive en shared/flujo.css) */
  .main { max-width: 1320px; margin: 0 auto; padding: 24px; }
  .toolbar { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px; display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  .search-box { flex: 1; min-width: 220px; }
  .filter-btn { background: var(--panel2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }
  .filter-btn:hover, .filter-btn.active { border-color: var(--accent); background: rgba(45, 90, 74, .15); }
  .reload-btn { background: linear-gradient(135deg, var(--accent), #1a3f2e); color: #fff; border: none; padding: 8px 16px; font-weight: 700; font-size: 11px; border-radius: 5px; cursor: pointer; text-transform: uppercase; }
  .reload-btn:hover { opacity: .9; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px; transition: border-color .2s, box-shadow .2s; cursor: pointer; }
  .card:hover, .card:focus-visible { border-color: var(--accent); box-shadow: 0 0 16px rgba(45, 90, 74, .2); }
  .card-preview { width: 100%; height: 180px; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 12px; border: 1px dashed var(--border); background: linear-gradient(135deg, var(--dark1), var(--dark3)); }
  .card-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .card-meta { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .card-desc { font-size: 12px; color: var(--text); line-height: 1.4; margin-bottom: 10px; }
  .card-tags { margin-bottom: 10px; }
  .card-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn-sm { background: var(--panel2); border: 1px solid var(--border); color: var(--text); padding: 4px 10px; border-radius: 3px; font-size: 11px; cursor: pointer; }
  .btn-sm:hover { border-color: var(--accent); }
  .btn-accent { background: rgba(45, 90, 74, .4); border-color: var(--accent); }

  .modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, .7); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .modal.active { display: flex; }
  .modal-content { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 24px; max-width: min(880px, 94vw); max-height: 90vh; overflow: auto; position: relative; display: flex; gap: 24px; }
  @media (max-width: 1024px) { .modal-content { flex-direction: column; } }
  .modal-preview-area { flex: 1; min-width: 0; }
  .modal-info-area { flex: 0 0 280px; display: flex; flex-direction: column; gap: 12px; font-size: 12px; }
  .modal-close { position: absolute; top: 16px; right: 16px; background: var(--panel2); border: 1px solid var(--border); width: 32px; height: 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 700; color: var(--text); }
  .modal-close:hover { border-color: var(--accent); }

  .section-title { font-size: 14px; font-weight: 700; padding: 16px 0 8px; margin: 0; border-bottom: 1px solid var(--border); color: var(--accent); }
  .section-title::before { content: "•"; margin-right: 8px; }
  .grid + .section-title { margin-top: 24px; }
</style>
</head>
<body>
<header>
  <div class="brand"><span class="dot"></span><h1>FLUJO</h1></div>
  <span class="badge">Material RD</span>
  <div class="nav">
    <a href="flujo_hub.html">Hub</a>
    <a href="plano_demo.html">Plano</a>
    <a href="svg_visualizer.html">Material</a>
    <span id="status" class="small muted" style="margin-left:8px">●</span>
  </div>
</header>

<div class="main">
  <div class="toolbar">
    <label class="sr-only" for="search">Buscar material</label>
    <input id="search" type="search" placeholder="Buscar material (flyer, rider, protocolo, etiqueta...)" class="search-box">
    <div role="group" aria-label="Filtrar por tipo" style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="filter-btn active" data-filter=""           aria-pressed="true">Todo</button>
      <button class="filter-btn"        data-filter="flyer"      aria-pressed="false">Flyers</button>
      <button class="filter-btn"        data-filter="rider"      aria-pressed="false">Riders</button>
      <button class="filter-btn"        data-filter="signage"    aria-pressed="false">Señalización</button>
      <button class="filter-btn"        data-filter="suplemento" aria-pressed="false">Suplementos</button>
    </div>
    <button class="reload-btn" id="btn-reload">Recargar</button>
  </div>

  <div id="count" class="small muted" style="margin:-8px 0 14px"></div>
  <div id="container" aria-live="polite"></div>
</div>

<div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal-content">
    <button class="modal-close" id="modal-close" aria-label="Cerrar">×</button>
    <div id="modal-body" style="display:contents"></div>
  </div>
</div>

<script src="shared/flujo.js"></script>
<script>
'use strict';
var E = Flujo.escapeHTML;

/* Datos demo (fallback). En modo real vienen de /api/materials con la misma forma. */
var DEMO_MATERIALS = [
  { id:'flyer-prevencion', category:'flyer', title:'Flyer Prevención DGD', desc:'Educativo sobre drogas de diseño. Stand informativo principal.', meta:'210×297mm | A4 • 2021', tags:['educación','DGD','prevención'] },
  { id:'flyer-testeo', category:'flyer', title:'Flyer Testeo Químico', desc:'Info sobre análisis colorimétrico. Distribución en stand testeo.', meta:'210×297mm | A4 • 2022', tags:['testeo','químico','safety'] },
  { id:'flyer-alcohol', category:'flyer', title:'Flyer Alcohol & Drogas', desc:'Combinaciones de riesgo. Educación general eventos.', meta:'210×297mm | A4 • 2022', tags:['alcohol','interacciones'] },
  { id:'rider-operativo', category:'rider', title:'Rider Operativo RD', desc:'Protocolo setup stand + atención. Para productoras de eventos.', meta:'6 págs • PDF • 2023', tags:['operativo','protocolo','eventos'] },
  { id:'rider-testeo', category:'rider', title:'Rider Testeo Químico', desc:'Procedimientos testeo, seguridad analista, manejo de residuos.', meta:'8 págs • PDF • 2023', tags:['testeo','safety','procedimiento'] },
  { id:'rider-contension', category:'rider', title:'Rider Zona Contención', desc:'Protocolos atención crisis emocional y primeros auxilios psicológicos.', meta:'5 págs • PDF • 2022', tags:['contención','salud mental','crisis'] },
  { id:'signage-stand', category:'signage', title:'Señalización Stand Principal', desc:'Banner + afiches para área stand informativo. Vinilo + cartulina.', meta:'1.5×2.0m • 2023', tags:['visual','stand','diseño'] },
  { id:'signage-testeo', category:'signage', title:'Señalización Zona Testeo', desc:'Indicadores de flujo de testeo + avisos de seguridad.', meta:'0.6×0.6m • avisos', tags:['testeo','flujo','seguridad'] },
  { id:'signage-descanso', category:'signage', title:'Señalización Zona Descanso', desc:'Señal de acceso a zona de descanso + protocolo. Tono calmo/seguro.', meta:'0.8×0.5m • 2023', tags:['descanso','acceso','protocolo'] },
  { id:'suplemento-mdma', category:'suplemento', title:'Suplemento: MDMA/Éxtasis', desc:'Dosis, efectos, riesgos, combinaciones peligrosas, reducción de daño.', meta:'4 págs • A5 • 2023', tags:['MDMA','éxtasis','dosis'] },
  { id:'suplemento-cocaina', category:'suplemento', title:'Suplemento: Cocaína', desc:'Rutas de administración, efectos cardiovasculares, primeros auxilios.', meta:'4 págs • A5 • 2023', tags:['cocaína','cardio','riesgos'] },
  { id:'suplemento-lsd', category:'suplemento', title:'Suplemento: LSD/Psicodélicos', desc:'Experiencia, setting, bad trips, gestión emocional.', meta:'4 págs • A5 • 2023', tags:['LSD','psicodélicos','bad-trip'] }
];

var state = { items: [], status: 'idle', query: '', filter: '', lastFocus: null };

/* ---------- carga (demo | api) ---------- */
async function loadMaterials() {
  setStatus('loading');
  try {
    if (Flujo.useDemo()) {
      state.items = DEMO_MATERIALS;
    } else {
      var data = await Flujo.fetchJSON('/api/materials');
      state.items = (data.items || data).map(normalize);
    }
    setStatus(state.items.length ? 'ready' : 'empty');
  } catch (e) {
    state.status = 'error'; state.error = e;
    Flujo.toast('No se pudieron cargar los materiales: ' + e.message, 'error');
  }
  render();
}

function normalize(r) {
  return {
    id: String(r.id || ''), category: String(r.category || 'otros'),
    title: String(r.title || 'Sin título'), desc: String(r.desc || r.description || ''),
    meta: String(r.meta || ''), tags: Array.isArray(r.tags) ? r.tags.map(String) : []
  };
}

function setStatus(s) { state.status = s; }

/* ---------- render principal por estado ---------- */
function render() {
  var c = document.getElementById('container');
  if (state.status === 'loading') { c.innerHTML = '<div class="state"><span class="spinner"></span><div style="margin-top:10px">Cargando materiales…</div></div>'; return; }
  if (state.status === 'error') { c.innerHTML = '<div class="state error">No se pudieron cargar los materiales.<br><button class="btn-sm" id="retry" style="margin-top:10px">Reintentar</button></div>'; document.getElementById('retry').onclick = loadMaterials; return; }

  var filtered = state.items.filter(function (m) {
    var q = state.query.toLowerCase();
    var okQ = !q || m.title.toLowerCase().indexOf(q) >= 0 || m.desc.toLowerCase().indexOf(q) >= 0 || m.tags.some(function (t) { return t.toLowerCase().indexOf(q) >= 0; });
    var okF = !state.filter || m.category === state.filter;
    return okQ && okF;
  });

  if (!filtered.length) {
    c.innerHTML = '<div class="state">No se encontraron materiales.<div class="small" style="margin-top:8px">Prueba otra búsqueda o cambia el filtro.</div></div>';
    return;
  }

  var cnt = document.getElementById('count');
  if (cnt) cnt.textContent = filtered.length + ' material(es)' +
    (state.filter ? ' · filtro: ' + state.filter : '') + (state.query ? ' · "' + state.query + '"' : '');

  var byCat = {};
  filtered.forEach(function (m) { (byCat[m.category] = byCat[m.category] || []).push(m); });
  var labels = { flyer:'Flyers Educativos', rider:'Riders Operativos', signage:'Señalización', suplemento:'Suplementos', otros:'Otros' };

  var html = '';
  Object.keys(byCat).sort().forEach(function (cat) {
    html += '<h3 class="section-title">' + E(labels[cat] || cat) + '</h3><div class="grid">';
    byCat[cat].forEach(function (m) { html += cardHTML(m); });
    html += '</div>';
  });
  c.innerHTML = html;
}

/* ---------- card (con tags visibles y TODO escapado) ---------- */
function cardHTML(m) {
  var tags = m.tags.map(function (t) { return '<span class="tag">' + E(t) + '</span>'; }).join('');
  return '' +
    '<div class="card" tabindex="0" role="button" aria-label="' + E(m.title) + '" data-id="' + E(m.id) + '">' +
      '<div class="card-preview">' +
        '<svg width="60" height="60" viewBox="0 0 60 60" fill="none" aria-hidden="true">' +
        '<rect x="8" y="12" width="44" height="36" rx="2" stroke="var(--accent)" stroke-width="2"/>' +
        '<text x="30" y="35" font-size="9" fill="var(--muted)" text-anchor="middle" font-weight="600">' + E(m.category.toUpperCase()) + '</text></svg>' +
      '</div>' +
      '<div class="card-title">' + E(m.title) + '</div>' +
      '<div class="card-meta">' + E(m.meta) + '</div>' +
      '<div class="card-desc">' + E(m.desc) + '</div>' +
      '<div class="card-tags">' + tags + '</div>' +
      '<div class="card-actions">' +
        '<button class="btn-sm btn-accent" data-act="detalle" data-id="' + E(m.id) + '">Detalles</button>' +
        '<button class="btn-sm" data-act="descargar" data-id="' + E(m.id) + '">Descargar</button>' +
      '</div>' +
    '</div>';
}

/* ---------- filtros (sin event global) ---------- */
function setFilter(cat, btn) {
  state.filter = cat;
  document.querySelectorAll('.filter-btn').forEach(function (b) {
    var on = b === btn;
    b.classList.toggle('active', on);
    b.setAttribute('aria-pressed', on ? 'true' : 'false');
  });
  render();
}

/* ---------- modal accesible ---------- */
var releaseTrap = null;
function openModal(id) {
  var m = state.items.find(function (x) { return x.id === id; });
  if (!m) return;
  state.lastFocus = document.activeElement;

  var tags = m.tags.map(function (t) { return '<span class="tag" style="background:var(--accent);color:#fff">' + E(t) + '</span>'; }).join('') || '<em class="muted">sin clasificar</em>';
  document.getElementById('modal-body').innerHTML =
    '<div class="modal-preview-area">' +
      '<div style="background:linear-gradient(135deg,var(--dark1),var(--dark3));border:1px solid var(--border);border-radius:4px;padding:16px;display:flex;align-items:center;justify-content:center;min-height:360px">' +
        '<svg width="100" height="100" viewBox="0 0 100 100" fill="none" aria-hidden="true"><rect x="15" y="20" width="70" height="60" rx="3" stroke="var(--accent)" stroke-width="2"/><text x="50" y="55" font-size="12" fill="var(--muted)" text-anchor="middle" font-weight="700">' + E(m.category.toUpperCase()) + '</text></svg>' +
      '</div></div>' +
    '<div class="modal-info-area">' +
      '<div><div id="modal-title" style="font-size:16px;font-weight:700;margin-bottom:8px">' + E(m.title) + '</div>' +
        '<div class="small muted" style="line-height:1.5">' + E(m.desc) + '</div></div>' +
      '<div style="border-top:1px solid var(--border);padding-top:12px"><div class="small muted" style="margin-bottom:4px">CATEGORÍA</div>' +
        '<div style="background:var(--panel2);padding:6px;border-radius:2px;font-size:11px;font-weight:600">' + E(m.category) + '</div></div>' +
      '<div><div class="small muted" style="margin-bottom:4px">METADATOS</div>' +
        '<div style="background:var(--panel2);padding:6px;border-radius:2px;font-size:11px">' + E(m.meta) + '</div></div>' +
      '<div><div class="small muted" style="margin-bottom:4px">TAGS</div>' +
        '<div style="display:flex;flex-wrap:wrap;gap:4px">' + tags + '</div></div>' +
      '<div style="border-top:1px solid var(--border);padding-top:12px;margin-top:auto">' +
        '<button class="btn-sm btn-accent" data-act="descargar" data-id="' + E(m.id) + '" style="width:100%;margin-bottom:6px">⬇ Descargar</button>' +
        '<button class="btn-sm" data-act="copiar" data-id="' + E(m.id) + '" style="width:100%">📋 Copiar ruta</button>' +
      '</div></div>';

  var modal = document.getElementById('modal');
  modal.classList.add('active');
  releaseTrap = Flujo.trapFocus(modal, closeModal);
  document.getElementById('modal-close').focus();
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  if (releaseTrap) { releaseTrap(); releaseTrap = null; }
  if (state.lastFocus && state.lastFocus.focus) state.lastFocus.focus();
}

/* ---------- acciones ---------- */
function descargar(id) {
  var m = state.items.find(function (x) { return x.id === id; });
  if (!m) return;
  if (Flujo.useDemo()) { Flujo.toast('Demo: descargaría ' + m.id + '.pdf'); return; }
  var a = document.createElement('a');
  a.href = '/api/materials/' + encodeURIComponent(m.id) + '/download';
  a.download = m.id + '.pdf';
  document.body.appendChild(a); a.click(); a.remove();
}
function copiarRuta(id) {
  var m = state.items.find(function (x) { return x.id === id; });
  if (!m) return;
  var path = '/svg/rd/' + m.category + '/' + m.id;
  if (navigator.clipboard) navigator.clipboard.writeText(path).then(function () { Flujo.toast('Ruta copiada: ' + path); });
  else Flujo.toast(path);
}

/* ---------- init: delegación de eventos (sin onclick inline) ---------- */
document.addEventListener('DOMContentLoaded', function () {
  document.getElementById('search').addEventListener('input', function (e) { state.query = e.target.value; render(); });

  document.querySelectorAll('.filter-btn').forEach(function (b) {
    b.addEventListener('click', function () { setFilter(b.dataset.filter, b); });
  });

  document.getElementById('btn-reload').addEventListener('click', loadMaterials);
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal').addEventListener('click', function (e) {
    if (e.target.id === 'modal') closeModal(); // click en backdrop
  });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeModal(); });

  // delegación: cards y botones de acción
  document.getElementById('container').addEventListener('click', function (e) {
    var actBtn = e.target.closest('[data-act]');
    if (actBtn) {
      e.stopPropagation();
      var id = actBtn.dataset.id;
      if (actBtn.dataset.act === 'detalle') openModal(id);
      else if (actBtn.dataset.act === 'descargar') descargar(id);
      else if (actBtn.dataset.act === 'copiar') copiarRuta(id);
      return;
    }
    var card = e.target.closest('.card');
    if (card) openModal(card.dataset.id);
  });
  // teclado en cards (Enter/Espacio)
  document.getElementById('container').addEventListener('keydown', function (e) {
    var card = e.target.closest('.card');
    if (card && (e.key === 'Enter' || e.key === ' ')) { e.preventDefault(); openModal(card.dataset.id); }
  });
  // delegación dentro del modal
  document.getElementById('modal-body').addEventListener('click', function (e) {
    var b = e.target.closest('[data-act]'); if (!b) return;
    if (b.dataset.act === 'descargar') descargar(b.dataset.id);
    else if (b.dataset.act === 'copiar') copiarRuta(b.dataset.id);
  });

  document.getElementById('status').textContent = Flujo.useDemo() ? '● modo demo' : '● conectado a /api';
  loadMaterials();
});
</script>
</body>
</html>
