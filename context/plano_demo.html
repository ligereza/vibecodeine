<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLUJO • Plano Intervención RD</title>
<style>
  :root {
    --bg: #0a0a0a; --panel: #141414; --panel2: #1a1a1a;
    --border: #2a2a2a; --text: #e8e8e8; --muted: #888;
    --flujo-ink: #1f2a24; --flujo-accent: #2d5a4a; --flujo-paper: #f8f1e3;
    --flujo-support: #675f55; --flujo-alert: #c2410f;
    --accent: #2d5a4a;
  }
  * { box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; margin: 0; }
  header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; gap: 12px; align-items: center; }
  header h1 { font-size: 18px; font-weight: 700; }
  .badge { background: var(--flujo-accent); padding: 3px 10px; border-radius: 4px; font-size: 11px; }
  .main { max-width: 1200px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 340px 1fr; gap: 20px; }
  @media (max-width: 900px) { .main { grid-template-columns: 1fr; } }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 10px; border-left: 3px solid var(--accent); padding-left: 8px; }
  label { display: block; font-size: 12px; color: var(--muted); margin: 8px 0 3px; }
  input, select, textarea { width: 100%; background: var(--panel2); border: 1px solid var(--border); color: var(--text); padding: 9px; border-radius: 5px; font-size: 13px; }
  input:focus { border-color: var(--accent); outline: none; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn { background: linear-gradient(135deg, var(--accent), #1a3f2e); color:#fff; border: none; padding: 9px 16px; font-weight:700; font-size:12px; border-radius:5px; cursor:pointer; text-transform:uppercase; letter-spacing:.05em; }
  .btn:hover { opacity: .9; }
  .btn-sec { background: var(--panel2); color: var(--text); border: 1px solid var(--border); }
  .preview-box { background: #0a0a0a; border: 1px solid var(--border); border-radius: 8px; min-height: 420px; display:flex; align-items:center; justify-content:center; overflow:auto; padding:12px; }
  .preview-box svg { max-width: 96%; max-height: 400px; box-shadow: 0 8px 30px rgba(0,0,0,.6); }
  .tabs { display:flex; gap:4px; margin-bottom:8px; }
  .tab { padding: 5px 12px; border:1px solid var(--border); background:var(--panel2); border-radius:4px; font-size:12px; cursor:pointer; }
  .tab.active { background: var(--accent); color:#fff; border-color: var(--accent); }
  .tab-content { display:none; }
  .tab-content.active { display:block; }
  .mono { font-family: ui-monospace, monospace; font-size: 12px; white-space: pre-wrap; background: var(--panel2); padding: 12px; border-radius: 5px; border:1px solid var(--border); max-height: 240px; overflow:auto; }
  .actions { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
  .nav { margin-left:auto; display:flex; gap:8px; }
  .nav a, .nav button { background: var(--panel2); color: var(--text); border: 1px solid var(--border); padding: 6px 12px; border-radius: 4px; font-size: 12px; text-decoration: none; cursor: pointer; }
  .nav a:hover, .nav button:hover { border-color: var(--accent); }
  .nav .back { font-weight: 600; }
  .checkbox-group { display: flex; gap: 12px; flex-wrap: wrap; }
  .checkbox-group label { margin: 0; display: inline-flex; align-items: center; gap: 6px; font-size: 12px; width: auto; }
</style>
</head>
<body>
<header>
  <h1>FLUJO</h1>
  <span class="badge">Plano Intervención RD</span>
  <div class="nav">
    <a class="back" href="flujo_hub.html" style="background:#1f2a24;border-color:#2d5a4a;font-weight:600">← Hub</a>
    <a href="svg_visualizer.html">Material RD</a>
    <span id="plano-conn" class="small muted" style="margin-left:8px">• local</span>
  </div>
</header>

<div class="main">

  <!-- CONTROLES -->
  <div class="panel">
    <div class="section-title">Evento</div>
    <label>Nombre<input id="nombre" value="Festival ejemplo 2026"></label>
    <div class="row">
      <label>Duración (h)<input id="duracion" type="number" value="6" step="0.5"></label>
      <label>Asistentes<input id="asistentes" type="number" value="2500"></label>
    </div>
    <div class="row">
      <label>Escala (px/m)<input id="scale" type="number" value="92"></label>
      <label>Voluntarios RD<input id="voluntarios" type="number" value="7" min="1"></label>
    </div>

    <div class="section-title" style="margin-top:12px">Servicios RD</div>
    <div class="checkbox-group">
      <label style="width: auto;"><input type="checkbox" id="incluye_testeo" checked> Testeo químico</label>
      <label style="width: auto;"><input type="checkbox" id="incluye_contension"> Zona contención</label>
    </div>

    <label style="margin-top:12px">Notas<textarea id="notas" rows="2">Stand informativo + educación preventiva</textarea></label>

    <div class="actions">
      <button class="btn" onclick="recalcular()">Recalcular</button>
      <button class="btn btn-sec" onclick="exportSVG()">Export SVG</button>
    </div>
  </div>

  <!-- PREVIEW + TABS -->
  <div>
    <div class="panel">
      <div class="tabs">
        <div class="tab active" onclick="setTab('plano')">Plano</div>
        <div class="tab" onclick="setTab('rider')">Rider</div>
        <div class="tab" onclick="setTab('costos')">Costos</div>
      </div>

      <div id="tab-plano" class="tab-content active">
        <div id="preview" class="preview-box"></div>
      </div>
      <div id="tab-rider" class="tab-content">
        <div id="rider" class="mono"></div>
      </div>
      <div id="tab-costos" class="tab-content">
        <div id="costos" class="mono"></div>
      </div>
    </div>

    <div class="panel" style="margin-top:14px">
      <div class="section-title">Brand RD</div>
      <div style="font-size:12px; display:flex; gap:8px; flex-wrap:wrap;">
        <span style="background:#1f2a24; color:#e8e8e8; padding:2px 6px; border-radius:2px;">ink #1f2a24</span>
        <span style="background:#2d5a4a; color:#fff; padding:2px 6px; border-radius:2px;">accent #2d5a4a</span>
        <span style="background:#f8f1e3; color:#111; padding:2px 6px; border-radius:2px;">paper #f8f1e3</span>
        <span style="background:#675f55; color:#fff; padding:2px 6px; border-radius:2px;">support</span>
      </div>
    </div>
  </div>

</div>

<script>
const A = {
  ink: '#1f2a24', accent: '#2d5a4a', paper: '#f8f1e3', support: '#675f55', alert: '#c2410f',
  dark0: '#0a0a0a', dark1: '#0d0d0d', dark2: '#111', dark3: '#151515', dark4: '#1f1f1f', dark5: '#222'
};

function setTab(t) {
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${t}"]`).classList.add('active');
  document.getElementById('tab-' + t).classList.add('active');
}

function recalcular() {
  const nombre = document.getElementById('nombre').value || 'Evento';
  const dur = parseFloat(document.getElementById('duracion').value) || 6;
  const vol = parseInt(document.getElementById('voluntarios').value) || 7;
  const asistentes = parseInt(document.getElementById('asistentes').value) || 2500;
  const scale = parseInt(document.getElementById('scale').value) || 92;
  const testeo = document.getElementById('incluye_testeo').checked;
  const contension = document.getElementById('incluye_contension').checked;

  // Realista
  const numMesas = 1 + Math.floor((vol - 1) / 5);
  const standW_m = 3.5;
  const standH_m = 3.0;
  const pasillo_m = 1.2;
  const mesaW_m = 2.0, mesaH_m = 0.7;
  const silla_m = 0.5;

  const standW = Math.floor(standW_m * scale);
  const standH = Math.floor(standH_m * scale);
  const pasilloW = Math.max(12, Math.floor(pasillo_m * scale * 0.7));
  const mesaW = Math.floor(mesaW_m * scale * 0.65);
  const mesaH = Math.floor(mesaH_m * scale * 0.7);
  const sillaSz = Math.floor(silla_m * scale * 0.8);

  const w = 620, h = 480;
  let html = `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="background:${A.dark0}">`;
  html += `<rect x="0" y="0" width="${w}" height="${h}" fill="${A.dark1}"/>`;

  let baseX = 28;
  let baseY = 48;

  // Stand informativo principal
  html += `<rect x="${baseX}" y="${baseY}" width="${standW}" height="${standH}" rx="6" fill="${A.dark2}" stroke="${A.accent}" stroke-width="2.5"/>`;
  html += `<text x="${baseX + 10}" y="${baseY + 18}" fill="${A.paper}" font-size="11" font-weight="700">STAND INFORMATIVO</text>`;
  html += `<text x="${baseX + 10}" y="${baseY + 33}" fill="${A.support}" font-size="8">${standW_m}×${standH_m}m • ${vol} personas</text>`;

  // Mesas: educación + distribución
  const marginInside = 8;
  const cols = 2;
  const gapMesa = 6;
  const mesasPerCol = Math.ceil(numMesas / cols);
  let mIdx = 0;
  for (let r = 0; r < mesasPerCol; r++) {
    for (let c = 0; c < cols; c++) {
      if (mIdx >= numMesas) break;
      const mx = baseX + marginInside + c * (mesaW + gapMesa);
      const my = baseY + 50 + r * (mesaH + 5);
      html += `<rect x="${mx}" y="${my}" width="${mesaW}" height="${mesaH}" rx="2" fill="${A.dark4}" stroke="${A.accent}" stroke-width="1"/>`;
      html += `<text x="${mx + 3}" y="${my + 11}" fill="${A.support}" font-size="6">mesa${mIdx + 1}</text>`;
      mIdx++;
    }
  }

  // Pasillo
  const circX = baseX + standW + 6;
  html += `<rect x="${circX}" y="${baseY - 4}" width="${pasilloW}" height="${standH + 28}" fill="none" stroke="${A.support}" stroke-width="1.5" stroke-dasharray="4 2"/>`;
  html += `<text x="${circX + 2}" y="${baseY + 14}" fill="${A.support}" font-size="6">pasillo</text>`;

  // Stand testeo
  if (testeo) {
    const testX = circX + pasilloW + 8;
    const testW = 118;
    const testH = 92;
    html += `<rect x="${testX}" y="${baseY + 6}" width="${testW}" height="${testH}" rx="4" fill="${A.dark2}" stroke="#ffb84d" stroke-width="2"/>`;
    html += `<text x="${testX + 8}" y="${baseY + 22}" fill="#ffb84d" font-size="9" font-weight="700">TESTEO</text>`;
    html += `<text x="${testX + 8}" y="${baseY + 34}" fill="${A.support}" font-size="7">Análisis químico</text>`;
    
    // Reactivos
    html += `<rect x="${testX + 8}" y="${baseY + 38}" width="35" height="24" rx="1" fill="${A.dark4}" stroke="${A.support}"/>`;
    html += `<text x="${testX + 10}" y="${baseY + 52}" fill="${A.support}" font-size="5">reactivos</text>`;
    
    // Mesas testeo
    html += `<rect x="${testX + 50}" y="${baseY + 38}" width="35" height="24" rx="1" fill="${A.dark4}" stroke="${A.support}"/>`;
    html += `<text x="${testX + 52}" y="${baseY + 52}" fill="${A.support}" font-size="5">mesas</text>`;
  }

  // Zona contención
  if (contension) {
    const contY = baseY + standH + 16;
    const contH = 44;
    html += `<rect x="${baseX}" y="${contY}" width="${standW}}" height="${contH}" rx="3" fill="${A.dark3}" stroke="#a855f7" stroke-width="1.5"/>`;
    html += `<text x="${baseX + 8}" y="${contY + 14}" fill="#a855f7" font-size="8" font-weight="700">ZONA CONTENCIÓN</text>`;
    html += `<text x="${baseX + 8}" y="${contY + 28}" fill="${A.support}" font-size="6">Baja estimulación • apoyo emocional</text>`;
  }

  // Info
  html += `<text x="30" y="24" fill="${A.accent}" font-size="9" font-weight="600">INTERVENCIÓN RD</text>`;
  html += `<text x="30" y="38" fill="${A.support}" font-size="7">Voluntarios: ${vol} • Dur: ${dur}h • ~${asistentes} asistentes</text>`;

  html += `</svg>`;

  document.getElementById('preview').innerHTML = html;
  generarRider();
}

function generarRider() {
  const nombre = document.getElementById('nombre').value || 'Evento';
  const dur = parseFloat(document.getElementById('duracion').value) || 6;
  const vol = parseInt(document.getElementById('voluntarios').value) || 7;
  const asistentes = parseInt(document.getElementById('asistentes').value) || 2500;
  const testeo = document.getElementById('incluye_testeo').checked;
  const contension = document.getElementById('incluye_contension').checked;
  const notas = document.getElementById('notas').value || '';

  let r = `RIDER INTERVENCIÓN RD — ${nombre}\n`;
  r += `═════════════════════════════════════════════════════════\n\n`;
  r += `EVENTO: ${nombre}\n`;
  r += `Duración: ${dur}h | Voluntarios RD: ${vol} | Asistentes ~${asistentes}\n`;
  r += `Fecha: [Completar] | Horario: [Completar]\n`;
  r += `Ubicación: [Dirección evento]\n\n`;
  
  r += `SERVICIOS REDUCIENDO DAÑO:\n`;
  r += `───────────────────────────────────────────────────────\n`;
  r += `• STAND INFORMATIVO (3.5×3.0m)\n`;
  r += `  - Educación preventiva sobre sustancias psicoactivas\n`;
  r += `  - Distribución suplementos pre y post fiesta\n`;
  r += `  - Orientación personalizada sin estigma\n`;
  r += `  - Acceso a protectores auditivos, abanicos, acessorios\n`;
  r += `  - Equipo: ${vol} personas (educadores, químicos farmacéuticos)\n`;
  if (testeo) r += `\n• STAND TESTEO (análisis colorimétrico)\n  - Procedimiento llevado por analistas químicos\n  - Análisis de sustancias psicoactivas de forma gratuita\n  - Recomendaciones de reducción de riesgos post-resultado\n  - Equipo: 2-3 analistas químicos\n`;
  if (contension) r += `\n• ZONA CONTENCIÓN (espacio baja estimulación)\n  - Atención a crisis emocional sin intervención médica\n  - Apoyo psicológico en eventos masivos\n  - Aloja asientos, luz tenue, ambiente tranquilo\n  - Equipo: psicólogos + facilitadores emocionales\n`;
  
  r += `\nREQUERIMIENTOS OPERATIVOS:\n`;
  r += `───────────────────────────────────────────────────────\n`;
  r += `ESPACIO:\n`;
  r += `• Stand principal: 3.5×3.0m (interior/exterior)\n`;
  r += `• Pasillo de circulación: 1.2m mínimo\n`;
  if (testeo) r += `• Stand testeo: 2.5×2.0m (espacio separado si es posible)\n`;
  if (contension) r += `• Zona contención: 3.5×2.0m (baja estimulación)\n`;
  
  r += `\nINFRAESTRUCTURA:\n`;
  r += `• Toldo/carpa (si es exterior)\n`;
  r += `• Mesas: ${1 + Math.floor((vol-1)/5)} unidades (2.0m)\n`;
  r += `• Sillas: ${vol + 2} para equipo\n`;
  r += `• Señalética: láminas plastificadas\n`;
  r += `• Iluminación: si es nocturno\n`;
  r += `• Electricidad: toma de corriente cercana (opcional)\n`;
  
  r += `\nCOORDINACIÓN CON EVENTO:\n`;
  r += `• Contacto producción: [Nombre/teléfono]\n`;
  r += `• Coordinación seguridad privada: [Sí/No]\n`;
  r += `• Equipo médico disponible: [Sí/No]\n`;
  if (dur > 5) r += `• Alimentación para equipo RD (${dur}h): $PRESUPUESTO\n`;
  r += `• Punto de encuentro operativo: [Ubicación en evento]\n`;
  
  r += `\nNOTAS ADICIONALES:\n`;
  r += `${notas || '– Completar con instrucciones específicas'}\n`;
  
  document.getElementById('rider').innerText = r;
}

function generarCostos() {
  const vol = parseInt(document.getElementById('voluntarios').value) || 7;
  const dur = parseFloat(document.getElementById('duracion').value) || 6;
  const testeo = document.getElementById('incluye_testeo').checked;
  const contension = document.getElementById('incluye_contension').checked;

  let c = `COTIZACIÓN INTERVENCIÓN RD\n\n`;
  c += `RECURSO HUMANO:\n`;
  c += `• ${vol} voluntarios x ${dur}h: depende negociación\n`;
  c += `  - Analistas químicos (testeo)\n`;
  c += `  - Educadores\n`;
  c += `  - Coordinadores\n\n`;
  c += `INFRAESTRUCTURA:\n`;
  c += `• Stand informativo + toldo: ~$180.000\n`;
  if (testeo) c += `• Kit testeo (reactivos + mesas): ~$95.000\n`;
  if (contension) c += `• Zona contención (asientos + señalización): ~$25.000\n`;
  c += `• Mesas + material educativo: ~$35.000\n\n`;
  if (dur > 5) c += `• Alimentación equipo: ~$65.000\n`;
  c += `\nTOTAL ESTIMADO: desde $335.000\n`;
  c += `(varía según negociación con evento/productora)`;

  document.getElementById('costos').innerText = c;
}

function exportSVG() {
  const svg = document.querySelector('#preview svg');
  if (!svg) { alert('Primero recalcula'); return; }
  const blob = new Blob([svg.outerHTML], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'intervension_rd_' + (document.getElementById('nombre').value || 'evento').replace(/\s+/g, '_') + '.svg';
  a.click();
  URL.revokeObjectURL(url);
}

function init() {
  setTimeout(() => {
    recalcular();
    setTab('rider');
    generarRider();
  }, 100);

  const paramIds = ['nombre', 'duracion', 'voluntarios', 'asistentes', 'scale', 'incluye_testeo', 'incluye_contension'];
  let t = null;
  paramIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      const handler = () => {
        clearTimeout(t);
        t = setTimeout(() => { recalcular(); }, 150);
      };
      el.addEventListener('input', handler);
      el.addEventListener('change', handler);
    }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !['INPUT','TEXTAREA','SELECT'].includes((e.target||{}).tagName)) recalcular();
  });
}

init();
</script>
</body>
</html>
