plugins {
    id 'com.android.application'
}

android {
    namespace 'com.xio.hotspotboot'
    compileSdk 34

    defaultConfig {
        applicationId 'com.xio.hotspotboot'
        minSdk 29
        targetSdk 34
        versionCode 1
        versionName '1.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled false
        }
    }
}
