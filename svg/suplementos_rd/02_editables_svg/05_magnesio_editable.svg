<g id="contenido_texto">
<text class="txt" x="185" y="753" fill="#2B6B4E" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Descripción</text>
<text class="txt" x="185" y="822" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">Suplemento alimenticio en gomitas a base de magnesio.</text>
<text class="txt" x="185" y="905.06" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">El magnesio es un mineral esencial que participa en más de 300 procesos fisiológicos,</text>
<text class="txt" x="185" y="956.1199999999999" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">incluyendo la función muscular, el sistema nervioso y el metabolismo energético.</text>
<text class="txt" x="185" y="1693" fill="#2B6B4E" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Formatos disponibles</text>
<text x="185" y="1758" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="33" font-weight="700">•</text>
<text class="txt" x="227" y="1758" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="33" font-weight="400">Citrato de magnesio: contribuye al funcionamiento normal del sistema nervioso y la función</text>
<text class="txt" x="227" y="1802.55" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="33" font-weight="400">muscular. Favorece el sueño y puede apoyar el tránsito intestinal.</text>
<text x="185" y="1882.1" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="33" font-weight="700">•</text>
<text class="txt" x="227" y="1882.1" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="33" font-weight="400">Bisglicinato de magnesio: contribuye al funcionamiento normal del sistema nervioso y la</text>
<text class="txt" x="227" y="1926.6499999999999" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="33" font-weight="400">función muscular. Favorece el sueño y tiene alta tolerancia digestiva.</text>
</g>
