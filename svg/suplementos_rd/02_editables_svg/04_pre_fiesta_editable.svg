<g id="contenido_texto">
<text class="txt" x="185" y="763" fill="#7650D8" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="48" font-weight="700">Descripción</text>
<text class="txt" x="185" y="835" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="50" font-weight="400">Pre Fiesta es un suplemento en gomitas formulado para</text>
<text class="txt" x="185" y="905.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="50" font-weight="400">preparar tu cuerpo antes de que llegue la exigencia física,</text>
<text class="txt" x="185" y="975.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="50" font-weight="400">mental y/o social.</text>
<text class="txt" x="185" y="1077.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="50" font-weight="400">Con vitaminas C y complejo B, taurina, L-teanina y extracto de</text>
<text class="txt" x="185" y="1147.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="50" font-weight="400">rhodiola — activos que apoyan el metabolismo energético, la</text>
<text class="txt" x="185" y="1217.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="50" font-weight="400">función neuromuscular, la claridad mental y la respuesta al</text>
<text class="txt" x="185" y="1287.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="50" font-weight="400">estrés.</text>
<text class="txt" x="185" y="1389.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="50" font-weight="400">Porque cuidarse antes también cuenta.</text>
<text class="txt" x="185" y="1703" fill="#7650D8" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="48" font-weight="700">Nutrientes</text>
<text x="185" y="1767" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="42" font-weight="700">•</text>
<text class="txt" x="235" y="1767" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="42" font-weight="400">Vitamina C y complejo B (B1, B6, B12): contribuyen al metabolismo</text>
<text class="txt" x="235" y="1825.8" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="42" font-weight="400">energético normal y al funcionamiento del sistema nervioso.</text>
<text x="185" y="1919.6" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="42" font-weight="700">•</text>
<text class="txt" x="235" y="1919.6" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="42" font-weight="400">Taurina: aminoácido involucrado en múltiples procesos fisiológicos,</text>
<text class="txt" x="235" y="1978.3999999999999" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="42" font-weight="400">incluyendo la función muscular y neurológica.</text>
<text x="185" y="2072.2" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="42" font-weight="700">•</text>
<text class="txt" x="235" y="2072.2" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="42" font-weight="400">L-teanina: asociada a estados de relajación sin sedación.</text>
<text x="185" y="2166.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="42" font-weight="700">•</text>
<text class="txt" x="235" y="2166.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="42" font-weight="400">Rhodiola: adaptógeno de uso tradicional en contextos de fatiga y estrés.</text>
</g>
