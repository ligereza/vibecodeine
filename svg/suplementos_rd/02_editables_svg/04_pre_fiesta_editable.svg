<g id="contenido_texto">
<text class="txt" x="185" y="753" fill="#EF7B2D" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Descripción</text>
<text class="txt" x="185" y="822" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">Pre Fiesta es un suplemento en gomitas formulado para preparar tu cuerpo antes de</text>
<text class="txt" x="185" y="873.06" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">que llegue la exigencia física, mental y/o social.</text>
<text class="txt" x="185" y="956.1199999999999" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">Con vitaminas C y complejo B, taurina, L-teanina y extracto de rhodiola — activos que</text>
<text class="txt" x="185" y="1007.1799999999998" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">apoyan el metabolismo energético, la función neuromuscular, la claridad mental y la</text>
<text class="txt" x="185" y="1058.2399999999998" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">respuesta al estrés.</text>
<text class="txt" x="185" y="1141.2999999999997" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="37" font-weight="400">Porque cuidarse antes también cuenta.</text>
<text class="txt" x="185" y="1693" fill="#EF7B2D" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Nutrientes</text>
<text x="185" y="1755" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="700">•</text>
<text class="txt" x="227" y="1755" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">Vitamina C y complejo B (B1, B6, B12): contribuyen al metabolismo energético normal y al</text>
<text class="txt" x="227" y="1795.5" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">funcionamiento del sistema nervioso.</text>
<text x="185" y="1871.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="700">•</text>
<text class="txt" x="227" y="1871.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">Taurina: aminoácido involucrado en múltiples procesos fisiológicos, incluyendo la función muscular y</text>
<text class="txt" x="227" y="1911.5" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">neurológica.</text>
<text x="185" y="1987.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="700">•</text>
<text class="txt" x="227" y="1987.0" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">L-teanina: asociada a estados de relajación sin sedación.</text>
<text x="185" y="2062.5" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="700">•</text>
<text class="txt" x="227" y="2062.5" fill="#161513" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30" font-weight="400">Rhodiola: adaptógeno de uso tradicional en contextos de fatiga y estrés.</text>
</g>
